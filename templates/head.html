<head>
	<title>{{ config.title }}</title>
	<link rel="icon" type="image/ico" href="/favicon.ico">
	<meta charset="utf-8">
	<meta name="description" content="{{ config.description }}">
	<meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
	<link rel="canonical" href="{{ config.base_url }}/">
	<meta property="og:title" content="{{ config.title }}">
	<meta property="og:description" content="{{ config.description }}">
	<meta property="og:type" content="{{ config.extra.og_type }}">
	<meta property="og:url" content="{{ config.base_url }}/">
	<meta property="og:image" content="{{ config.base_url }}/{{ config.extra.og_image }}">
	<meta name="twitter:card" content="{{ config.extra.twitter_card }}">
	<meta name="twitter:title" content="{{ config.title }}">
	<meta name="twitter:description" content="{{ config.description }}">
	<meta name="twitter:image" content="{{ config.base_url }}/{{ config.extra.og_image }}">
	<script type="application/ld+json">
		{
			"@context": "https://schema.org",
			"@graph": [
				{
					"@type": "Person",
					"@id": "{{ config.base_url | safe }}/#person",
					"name": "{{ config.extra.your_name }}",
					"url": "{{ config.base_url | safe }}/",
					"email": "{{ config.extra.email }}",
					"jobTitle": "{{ config.extra.your_title }}",
					"description": "{{ config.description }}",
					"address": {
						"@type": "PostalAddress",
						"addressLocality": "{{ config.extra.your_city }}",
						"addressCountry": "{{ config.extra.your_country_code }}"
					},
					"sameAs": [
						{% for url in config.extra.same_as %}"{{ url | safe }}"{% if not loop.last %},{% endif %}{% endfor %}
					]
				},
				{
					"@type": "WebSite",
					"@id": "{{ config.base_url | safe }}/#website",
					"name": "{{ config.title }}",
					"url": "{{ config.base_url | safe }}/",
					"description": "{{ config.description }}",
					"publisher": {
						"@id": "{{ config.base_url | safe }}/#person"
					},
					"inLanguage": "{{ config.extra.language }}"
				}
			]
		}
	</script>
	<link rel="stylesheet" href="css/main.min.css">
	<noscript>
		<link rel="stylesheet" href="css/noscript.css">
	</noscript>
</head>
